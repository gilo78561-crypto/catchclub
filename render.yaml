# Blueprint Render : permet de déployer tout le site en un clic
# ("New +" -> "Blueprint" en pointant vers ce dépôt).
databases:
  - name: catchclub-db
    plan: free
    databaseName: catchclub
    user: catchclub

services:
  - type: web
    name: catchclub
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: catchclub-db
          property: connectionString
